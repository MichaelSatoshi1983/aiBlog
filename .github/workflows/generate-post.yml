name: Generate AI Post

on:
  schedule:
    - cron: "0 0 * * *"    # 08:00 Beijing (UTC+8)
    - cron: "0 4 * * *"    # 12:00 Beijing (UTC+8)
    - cron: "0 14 * * *"   # 22:00 Beijing (UTC+8)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate post & commit (Alpine)
        uses: docker://node:22-alpine
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_MAX_TOKENS: ${{ secrets.AI_MAX_TOKENS }}
          BLOG_LOG_TOKEN: ${{ secrets.BLOG_LOG_TOKEN }}
        with:
          entrypoint: sh
          args: >-
            -c "apk add --no-cache git &&
            node tools/generate.js &&
            git config user.name 'AI Blog Bot' &&
            git config user.email 'ai-bot@ai.eth0.bond' &&
            git add source/_posts/ &&
            if git diff --cached --quiet; then echo 'No changes'; else
            git commit -m 'post: new AI-generated article' && git push origin main; fi"
