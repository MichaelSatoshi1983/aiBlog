name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps & build (Alpine)
        uses: docker://node:22-alpine
        env:
          AI_API_KEY: dummy
          AI_API_URL: https://dummy.com
          AI_MODEL: dummy
        with:
          entrypoint: sh
          args: >-
            -c "apk add --no-cache git &&
            npm install -g pnpm &&
            pnpm install --frozen-lockfile &&
            npx hexo generate &&
            echo 'ai.eth0.bond' > public/CNAME"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
